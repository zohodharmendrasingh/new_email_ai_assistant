<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Metwall AI Email</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;overflow:hidden}
button,textarea,input,select{outline:none;font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* Light mode */
body.light{background:#f0f2f5;color:#1a1a1a}
body.light .sidebar{background:white;border-color:#e0e0e0}
body.light .topbar{background:white;border-color:#e0e0e0}
body.light .card{background:white;color:#1a1a1a}
body.light .panel{background:white}
body.light .detail-bg{background:#f8f9fa}
body.light input,body.light textarea,body.light select{background:white;color:#333;border-color:#e0e0e0}
body.light .nav-item{color:#444}
body.light .nav-item:hover{background:#e8eaed}
body.light .nav-item.act{background:#d3e3fd;color:#0842a0}
body.light .section-card{background:white;box-shadow:0 1px 3px rgba(0,0,0,.08)}
body.light .compose-win{background:white;border-color:#e0e0e0}
body.light .move-dd{background:#ffffff!important;border-color:#e0e0e0;opacity:1!important}
body.light .ghost{border-color:#dadce0!important;color:#555}
body.light .ghost:hover{background:#f1f3f4}
body.light .search-bar{background:#f1f3f4;border-color:transparent}
body.light .search-bar:focus{background:white;border-color:#1a73e8}

/* Dark mode */
body.dark{background:#0f0f0f;color:#e8e3d9}
body.dark .sidebar{background:#1a1a1a;border-color:#2a2a2a}
body.dark .topbar{background:#1a1a1a;border-color:#2a2a2a}
body.dark .card{background:#1e1e1e;color:#e8e3d9;border-color:#2a2a2a}
body.dark .card:hover{background:#252525}
body.dark .card.sel{border-color:#1a73e8}
body.dark .panel{background:#1a1a1a}
body.dark .detail-bg{background:#141414}
body.dark input,body.dark textarea,body.dark select{background:#252525;color:#e8e3d9;border-color:#333}
body.dark .nav-item{color:#aaa}
body.dark .nav-item:hover{background:#252525}
body.dark .nav-item.act{background:#1a2a3a;color:#7ab3ff}
body.dark .section-card{background:#1e1e1e;box-shadow:0 1px 3px rgba(0,0,0,.4)}
body.dark .compose-win{background:#1e1e1e;border-color:#333}
body.dark .move-dd{background:#1e1e1e!important;border-color:#333;opacity:1!important}
body.dark .ghost{border-color:#444!important;color:#aaa}
body.dark .ghost:hover{background:#252525}
body.dark .search-bar{background:#252525;border-color:transparent;color:#e8e3d9}
body.dark .search-bar:focus{background:#2a2a2a;border-color:#1a73e8}
body.dark .lane-body{border-color:#2a2a2a}

.card{border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;border:2px solid transparent;transition:all .15s;position:relative;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.card.sel{border-color:#1a73e8}
.card.ok{border-color:#0f9d58}
.lane-wrap{display:flex;flex-direction:column;min-width:260px;max-width:260px;height:100%;flex-shrink:0}
.lane-head{padding:10px 12px;border-radius:10px 10px 0 0;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.lane-body{flex:1;overflow-y:auto;padding:8px;border-radius:0 0 10px 10px;border:2px solid rgba(0,0,0,.05);border-top:none;min-height:100px;transition:all .2s}
.lane-body.over{background:rgba(26,115,232,.08)!important;border-color:#1a73e8!important}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:0 20px 20px 0;cursor:pointer;font-size:13px;margin-right:8px;transition:background .1s}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;font-size:10px;font-weight:700;padding:0 4px}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.btn{border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;padding:7px 14px;border:none;transition:all .15s}
.blue{background:#1a73e8;color:white}.blue:hover{background:#1557b0}.blue:disabled{background:#a8c7fa;cursor:wait}
.green{background:#0f9d58;color:white}.green:hover{background:#0b7a44}
.ghost{background:transparent;border:1px solid #dadce0!important}
.red{background:transparent;border:1px solid #ea4335!important;color:#ea4335}.red:hover{background:#fce8e6}
.move-dd{position:fixed;border-radius:10px;z-index:99999;box-shadow:0 8px 32px rgba(0,0,0,.35);min-width:220px;max-height:min(400px,calc(100vh - 24px));overflow-y:auto;overflow-x:hidden;isolation:isolate}
.compose-win{position:fixed;bottom:0;right:20px;width:480px;border-radius:14px 14px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.18);z-index:1000;display:flex;flex-direction:column;border:1px solid #e0e0e0;border-bottom:none}
.search-bar{width:100%;border:1.5px solid transparent;border-radius:20px;padding:7px 14px 7px 36px;font-size:13px;transition:all .2s}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{border-radius:14px;padding:24px;width:360px;box-shadow:0 8px 32px rgba(0,0,0,.2)}

/* Mobile */
@media(max-width:768px){
  .sidebar{position:fixed;left:-200px;top:0;height:100vh;z-index:300;transition:left .25s}
  .sidebar.open{left:0}
  .compose-win{width:100%;right:0;border-radius:14px 14px 0 0}
  .lane-wrap{min-width:240px;max-width:240px}
  .mobile-overlay{display:block}
}
@media(min-width:769px){
  .mobile-overlay{display:none}
  .hamburger{display:none}
}
.mobile-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:299;display:none}

@keyframes fadein{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideup{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body class="light">
<div id="root"></div>
<script type="text/babel">
const BASE="https://metwall-ai-assistant-production.up.railway.app";
function loadState(){try{const s=localStorage.getItem("metwall_v1");return s?JSON.parse(s):{}}catch{return {}}}
function saveState(p){try{localStorage.setItem("metwall_v1",JSON.stringify({...loadState(),...p}));}catch{}}
const _S=loadState();

const DEFAULT_LANES=[
  {id:"Important & Customers",label:"Important & Customers",icon:"🤝",color:"#1a73e8",bg:"#e8f0fe",builtIn:true},
  {id:"internal",label:"Internal Team",icon:"👥",color:"#0f9d58",bg:"#e6f4ea",builtIn:true},
  {id:"engineering",label:"WE Engineering",icon:"⚙️",color:"#5c35cc",bg:"#ede7f6",builtIn:false,teamInbox:"we-engineering@metwall.com"},
  {id:"cc",label:"CC'd to Me",icon:"📋",color:"#f4b400",bg:"#fef7e0",builtIn:true},
  {id:"newsletters",label:"Newsletters",icon:"📰",color:"#9c27b0",bg:"#f3e5f5",builtIn:true},
  {id:"banks",label:"Banks & Expenses",icon:"🏦",color:"#0097a7",bg:"#e0f7fa",builtIn:true},
  
];

const INT_DOMAINS=["metwall.com","metrika.mx","metrikaoffice.com"];
const SPAM_FROM=["noreply","no-reply","notification","notifications","mailer","alerts","newsletter","marketing","@service.","@mailer.","@e.","@alerts.","@o.","feedback@service","message-service","avisos.","zoho-","linkedin","twitter","facebook","instagram"];
const BANK_KEYS=["bank","sofi","coinbase","chase","wells","citi","amex","paypal","zelle","statement","loan","crypto","bitcoin","usdc","transaction","santander","bbva","hsbc","scotiabank","banamex","credit card","debit card","balance","deposit","withdrawal","wire","brokerage","invest"];
const EXPENSE_KEYS=["invoice","receipt","order confirmation","bill","subscription","renewal","sat.gob","factura","pago","expedia","amazon","uber","airbnb","delta","hotel","booking","declaracion","renta","expense","reimburs"];

function fmtTime(ts){
  if(!ts)return"";
  const d=new Date(parseInt(ts)),now=new Date(),diff=now-d;
  if(diff<86400000)return d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  if(diff<604800000)return d.toLocaleDateString([],{weekday:"short"});
  return d.toLocaleDateString([],{month:"short",day:"numeric"});
}
function strip(html){
  if(!html)return"";
  return html.replace(/<style[^>]*>[\s\S]*?<\/style>/gi,"").replace(/<[^>]+>/g," ").replace(/&nbsp;/g," ").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&amp;/g,"&").replace(/&#39;/g,"'").replace(/\s+/g," ").trim();
}
function clean(s){return(s||"").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&amp;/g,"&");}

function classify(email,customLanes,rules){
  const fr=(email.from||"").toLowerCase();
  const subj=(email.subject||"").toLowerCase();
  const summ=(email.summary||"").toLowerCase();
  const all=fr+" "+subj+" "+summ;
  // Check learned rules first
  if(rules){
    for(const rule of rules){
      if(rule.type==="domain"&&fr.includes(rule.pattern))return rule.lane;
      if(rule.type==="keyword"&&all.includes(rule.pattern))return rule.lane;
    }
  }
  if(INT_DOMAINS.some(d=>fr.includes(d)))return"internal";
  // Team inboxes
  const teamInboxes=customLanes?customLanes.filter(l=>l.teamInbox):[];
  for(const tl of teamInboxes){
    if(fr.includes(tl.teamInbox)||all.includes(tl.id))return tl.id;
  }
  if(BANK_KEYS.some(k=>all.includes(k)))return"banks";
  if(EXPENSE_KEYS.some(k=>all.includes(k)))return"expenses";
  if(SPAM_FROM.some(k=>fr.includes(k)))return"newsletters";
  const to=(email.toAddress||"").toLowerCase();
  const my=["alfonso@metwall","alfonsom@metwall","amp@metwall","alfonso.mendez@metwall"];
  if(to&&to!=="not provided"&&!my.some(m=>to.includes(m)))return"cc";
  return"customers";
}

function Av({name,email,size=32,dark}){
  const cols=["#1a73e8","#0f9d58","#f4b400","#db4437","#673ab7","#e91e63","#009688","#ff5722","#795548","#0097a7"];
  const s=name||email||"?";
  const init=s.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase()||s[0].toUpperCase();
  return React.createElement("div",{style:{width:size,height:size,borderRadius:"50%",background:cols[s.charCodeAt(0)%cols.length],color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.36,fontWeight:700,flexShrink:0}},init);
}

const ICONS=["🤝","👥","📋","📰","🏦","💳","📁","🗂","📌","⭐","🔥","💼","🏗","🌎","💡","🎯"];
const FLAGS=[
  {id:"red",label:"Urgent",color:"#ea4335",emoji:"🔴"},
  {id:"orange",label:"Important",color:"#fa7b17",emoji:"🟠"},
  {id:"yellow",label:"Follow-up",color:"#fbbc04",emoji:"🟡"},
  {id:"green",label:"Done",color:"#34a853",emoji:"🟢"},
  {id:"blue",label:"FYI",color:"#4285f4",emoji:"🔵"},
  {id:"purple",label:"VIP",color:"#9334e6",emoji:"🟣"},
];

const COLORS=[{c:"#1a73e8",bg:"#e8f0fe"},{c:"#0f9d58",bg:"#e6f4ea"},{c:"#f4b400",bg:"#fef7e0"},{c:"#9c27b0",bg:"#f3e5f5"},{c:"#0097a7",bg:"#e0f7fa"},{c:"#e65100",bg:"#fff3e0"},{c:"#c62828",bg:"#ffebee"},{c:"#4527a0",bg:"#ede7f6"},{c:"#2e7d32",bg:"#e8f5e9"},{c:"#37474f",bg:"#eceff1"}];

function App(){
  const [emails,setEmails]=React.useState([]);
  const [lanes,setLanes]=React.useState(()=>_S.lanes||DEFAULT_LANES);
  const [overrides,setOverrides]=React.useState(()=>_S.overrides||{});
  const [rules,setRules]=React.useState(()=>_S.rules||[]);
  const [sel,setSel]=React.useState(null);
  const [emailBody,setEmailBody]=React.useState(null);
  const [loadBody,setLoadBody]=React.useState(false);
  const [draft,setDraft]=React.useState("");
  const [view,setView]=React.useState("lanes");
  const [dark,setDark]=React.useState(false);
  const [search,setSearch]=React.useState("");
  const [dateFilter,setDateFilter]=React.useState("today");
  const [unreadFilter,setUnreadFilter]=React.useState("all"); // "all" | "unread"
  const [insts,setInsts]=React.useState(_S.insts||[
    {id:1,text:"Always respond in the same language as the sender",active:true},
    {id:2,text:"Sign as 'Alfonso Mendez, President & CEO | Metwall'",active:true},
    {id:3,text:"For urgent pricing, mention you'll respond same day",active:true},
    {id:4,text:"Keep replies concise — no more than 3 paragraphs",active:true},
    {id:5,text:"For podcast invitations, ask for details before committing",active:true},
  ]);
  const [newInst,setNewInst]=React.useState("");
  const [toast,setToast]=React.useState(null);
  const [loadEmails,setLoadEmails]=React.useState(false);
  const [loadDraft,setLoadDraft]=React.useState(false);
  const [saveDraft,setSaveDraft]=React.useState(false);
  const [teach,setTeach]=React.useState("");
  const [stars,setStars]=React.useState(new Set());
  const [approved,setApproved]=React.useState(new Set());
  const [deleted,setDeleted]=React.useState(new Set());
  const [readIds,setReadIds]=React.useState(()=>new Set(_S.readIds||[]));
  const [priority,setPriority]=React.useState(null);
  const [showDraft,setShowDraft]=React.useState(false);
  const [dragId,setDragId]=React.useState(null);
  const [dragOver,setDragOver]=React.useState(null);
  const [dragLaneId,setDragLaneId]=React.useState(null);
  const [dragLaneOver,setDragLaneOver]=React.useState(null);
  const [hiddenLanes,setHiddenLanes]=React.useState(()=>new Set(_S.hiddenLanes||[]));
  const [moveMenu,setMoveMenu]=React.useState(null);
  const [menuPos,setMenuPos]=React.useState({top:0,left:0});
  const [confirmModal,setConfirmModal]=React.useState(null); // {msg, onOk}
  const [compose,setCompose]=React.useState(null);
  const [composeMode,setComposeMode]=React.useState("reply");
  const [composeTo,setComposeTo]=React.useState("");
  const [composeSubj,setComposeSubj]=React.useState("");
  const [composeBody,setComposeBody]=React.useState("");const [agentOpen,setAgentOpen]=React.useState(false);const [agentMsgs,setAgentMsgs]=React.useState([{r:"a",t:"Hi Alfonso! Tell me what to do — move emails between lanes, organize by sender, anything. Try: Move all RFQ emails to Quotes"}]);const [agentInput,setAgentInput]=React.useState("");const [agentBusy,setAgentBusy]=React.useState(false);const [draftChat,setDraftChat]=React.useState([]);const [draftChatInput,setDraftChatInput]=React.useState("");const [draftChatBusy,setDraftChatBusy]=React.useState(false);
  const [sending,setSending]=React.useState(false);
  const [sidebarOpen,setSidebarOpen]=React.useState(false);
  const [showNewLane,setShowNewLane]=React.useState(false);
  const [newLaneName,setNewLaneName]=React.useState("");
  const [newLaneIcon,setNewLaneIcon]=React.useState("📁");
  const [newLaneColor,setNewLaneColor]=React.useState(COLORS[6]);
  const [styleEx,setStyleEx]=React.useState("");
  
  
  const [renamingLane,setRenamingLane]=React.useState(null); // laneId
  const [renameLaneVal,setRenameLaneVal]=React.useState({label:"",icon:""});
  const [emailFlags,setEmailFlags]=React.useState(()=>_S.emailFlags||{}); // emailId -> flagId
  const [flagMenu,setFlagMenu]=React.useState(null); // emailId
  const [contacts,setContacts]=React.useState([]);
  const [loadContacts,setLoadContacts]=React.useState(false);
  const [contactSearch,setContactSearch]=React.useState("");

  React.useEffect(()=>{
    document.body.className=dark?"dark":"light";
  },[dark]);

  const toast_=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};

  const fetchEmails=async()=>{
    setLoadEmails(true);
    try{
      const r=await fetch(BASE+"/inbox");
      const d=await r.json();
      if(Array.isArray(d)){const vis=d.filter(e=>!deleted.has(e.id));setEmails(vis);setReadIds(prev=>{const s=new Set(prev);vis.forEach(e=>{if(e.status===1||e.status==="1")s.add(e.id);else if(e.status===0||e.status==="0")s.delete(e.id);});return s;});}
    }catch{toast_("Failed to load emails","error");}
    setLoadEmails(false);
  };
  React.useEffect(()=>{fetchEmails();},[]);

  React.useEffect(()=>{saveState({lanes,overrides,rules,hiddenLanes:[...hiddenLanes],emailFlags,insts,readIds:[...readIds]});},[lanes,overrides,rules,hiddenLanes,emailFlags,insts,readIds]);
  

  const fetchContacts=async()=>{
    setLoadContacts(true);
    try{
      const r=await fetch(BASE+"/contacts");
      const d=await r.json();
      if(Array.isArray(d))setContacts(d);
      else setContacts([]);
    }catch{
      // Fallback: extract unique senders from emails
      const seen=new Set();
      const derived=emails.filter(e=>e.from&&!seen.has(e.from)&&seen.add(e.from)).map(e=>({name:e.sender||e.from.split("@")[0],email:e.from,source:"inbox"}));
      setContacts(derived);
    }
    setLoadContacts(false);
  };

  const getLane=e=>overrides[e.id]||classify(e,lanes,rules);

  const filteredEmails=React.useMemo(()=>{
    const now=new Date();
    const startOfDay=(d)=>{const x=new Date(d);x.setHours(0,0,0,0);return x;};
    const cutoff={
      today:startOfDay(now),
      yesterday:startOfDay(new Date(now-86400000)),
      "3days":startOfDay(new Date(now-2*86400000)),
      "4days":startOfDay(new Date(now-3*86400000)),
      "5days":startOfDay(new Date(now-4*86400000)),
      week:startOfDay(new Date(now-6*86400000)),
    }[dateFilter]||startOfDay(now);
    const endCutoff=dateFilter==="yesterday"?startOfDay(now):null;
    let base=emails.filter(e=>{
      if(deleted.has(e.id))return false;
      const t=new Date(parseInt(e.receivedTime||e.time||0));
      if(endCutoff&&t>=endCutoff)return false;
      return t>=cutoff;
    });
    if(!search.trim()&&unreadFilter==="all")return base;
    let result=unreadFilter==="unread"?base.filter(e=>!readIds.has(e.id)):base;
    if(!search.trim())return result;
    const q=search.toLowerCase();
    return result.filter(e=>(e.subject||"").toLowerCase().includes(q)||(e.from||"").toLowerCase().includes(q)||(e.sender||"").toLowerCase().includes(q)||(e.summary||"").toLowerCase().includes(q));
  },[emails,deleted,search,dateFilter,unreadFilter,readIds]);

  const laneMap=React.useMemo(()=>{
    const m={};
    lanes.forEach(l=>{m[l.id]=[];});
    const visibleLanes=lanes.filter(l=>!hiddenLanes.has(l.id));
    const fallbackId=visibleLanes.length?visibleLanes[0].id:lanes[0].id;
    filteredEmails.forEach(e=>{
      const l=getLane(e);
      // If classified lane is hidden and no manual override, redirect to first visible lane
      const targetId=(m[l]!==undefined&&!hiddenLanes.has(l))?l:(overrides[e.id]&&m[overrides[e.id]]!==undefined?overrides[e.id]:fallbackId);
      if(m[targetId])m[targetId].push(e);
      else m[fallbackId].push(e);
    });
    return m;
  },[filteredEmails,overrides,lanes,rules,hiddenLanes]);

  const unreadCount=laneId=>(laneMap[laneId]||[]).filter(e=>!readIds.has(e.id)).length;

  const moveTo=(emailId,laneId,email)=>{
    setOverrides(p=>({...p,[emailId]:laneId}));
    setMoveMenu(null);
    const domain=email&&email.from?email.from.split("@")[1]:null;
    if(domain)setRules(p=>[...p,{pattern:domain,lane:laneId,type:"domain"}]);
    toast_("→ Moved to "+lanes.find(l=>l.id===laneId).label+" · AI learned");
  };

  const reorderLane=(fromId,toId)=>{if(fromId===toId)return;setLanes(prev=>{const arr=[...prev];const fi=arr.findIndex(l=>l.id===fromId);const ti=arr.findIndex(l=>l.id===toId);const [m]=arr.splice(fi,1);arr.splice(ti,0,m);return arr;});toast_("↔ Lane reordered");};
  const toggleHideLane=(laneId)=>{setHiddenLanes(prev=>{const s=new Set(prev);if(s.has(laneId)){s.delete(laneId);toast_("👁 Lane visible");}else{s.add(laneId);toast_("🙈 Lane hidden");}return s;});};
  const markReadInZoho=async(email,isRead)=>{
    if(!email||!email.folderId||!email.id)return;
    try{await fetch(BASE+"/mark-read",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({folderId:email.folderId,messageId:email.id,isRead})});}
    catch{}
  };
  const startRename=(lane)=>{
    setRenamingLane(lane.id);
    setRenameLaneVal({label:lane.label,icon:lane.icon});
  };

  const saveRename=()=>{
    if(!renamingLane||!renameLaneVal.label.trim())return;
    setLanes(prev=>prev.map(l=>l.id===renamingLane?{...l,label:renameLaneVal.label.trim(),icon:renameLaneVal.icon}:l));
    setRenamingLane(null);
    toast_("✓ Lane renamed!");
  };

  const setFlag=(emailId,flagId)=>{
    setEmailFlags(prev=>({...prev,[emailId]:flagId===prev[emailId]?null:flagId}));
    setFlagMenu(null);
    const flag=FLAGS.find(f=>f.id===flagId);
    if(flag)toast_(flag.emoji+" Flagged as "+flag.label);
  };

                <div className="section-card" style={{borderRadius:12,padding:18}}>
                  <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>Writing Style</div>
                  <p style={{fontSize:12,opacity:.6,marginBottom:8}}>Paste your best replies so the AI learns your tone.</p>
                  <textarea value={styleEx} onChange={e=>setStyleEx(e.target.value)}
                    placeholder="Paste an example reply..."
                    style={{width:"100%",border:"1px solid rgba(128,128,128,.2)",borderRadius:8,padding:10,fontSize:13,lineHeight:1.7,resize:"vertical",minHeight:120,background:"transparent"}}/>
                  <button className="btn blue" style={{marginTop:8,fontSize:12,borderRadius:20}} onClick={()=>{if(styleEx.trim()){toast_("✓ Style saved");setStyleEx("");}}}>Save Style</button>
                </div>
              </div>
            </div>
          )}

          {/* Rules */}
          {view==="rules"&&(
            <div style={{flex:1,overflowY:"auto",padding:20}}>
              <div style={{maxWidth:600,margin:"0 auto"}}>
                <h1 style={{fontSize:18,fontWeight:700,marginBottom:4}}>Lane Rules</h1>
                <p style={{fontSize:13,opacity:.6,marginBottom:20}}>Applied automatically when emails arrive.</p>
                <div className="section-card" style={{borderRadius:12,padding:18,marginBottom:16}}>
                  <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>Built-in Rules</div>
                  {[
                    ["From metwall.com, metrika.mx","👥 Internal"],
                    ["bank, SoFi, Coinbase, crypto, statement, loan...","🏦 Banks & Finance"],
                    ["invoice, receipt, SAT, factura, subscription...","💳 Expenses & Bills"],
                    ["noreply, no-reply, LinkedIn, notifications...","📰 Newsletters"],
                    ["All others","🤝 Customers"],
                  ].map(([r,l],i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid rgba(128,128,128,.1)"}}>
                      <span style={{fontSize:12,flex:1,opacity:.8}}>{r}</span>
                      <span style={{fontSize:11,opacity:.5}}>→ {l}</span>
                    </div>
                  ))}
                </div>
                <div className="section-card" style={{borderRadius:12,padding:18}}>
                  <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>Learned Rules ({rules.length})</div>
                  {rules.length===0
                    ?<div style={{opacity:.4,fontSize:13,padding:"12px 0",textAlign:"center"}}>Move emails between lanes to teach the AI.</div>
                    :rules.map((r,i)=>{
                      const lane=lanes.find(l=>l.id===r.lane);
                      return(
                        <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid rgba(128,128,128,.1)"}}>
                          <span>{lane&&lane.icon}</span>
                          <span style={{fontSize:12,flex:1,opacity:.8}}>{r.type==="domain"?"Domain: ":"Keyword: "}{r.pattern}</span>
                          <span style={{fontSize:11,color:lane&&lane.color,fontWeight:600}}>→ {lane&&lane.label}</span>
                          <button onClick={()=>setRules(rules.filter((_,j)=>j!==i))} style={{background:"none",border:"none",opacity:.3,cursor:"pointer"}}>×</button>
                        </div>
                      );
                    })}
                </div>
              </div>
            </div>
          )}

          {/* Contacts */}
          {view==="contacts"&&(
            <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
              <div style={{padding:"12px 20px",borderBottom:"1px solid rgba(128,128,128,.15)",display:"flex",gap:12,alignItems:"center",flexShrink:0}}>
                <div style={{flex:1,position:"relative"}}>
                  <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",opacity:.4}}>🔍</span>
                  <input value={contactSearch} onChange={e=>setContactSearch(e.target.value)}
                    placeholder="Search contacts..."
                    className="search-bar" style={{paddingLeft:32}}/>
                </div>
                <button className="btn blue" style={{fontSize:11,borderRadius:20,whiteSpace:"nowrap"}} onClick={fetchContacts}>{loadContacts?"Loading...":"↺ Refresh"}</button>
              </div>
              <div style={{flex:1,overflowY:"auto",padding:16}}>
                {loadContacts?(
                  <div style={{textAlign:"center",padding:40,opacity:.4}}>Loading contacts...</div>
                ):contacts.length===0?(
                  <div style={{textAlign:"center",padding:40}}>
                    <div style={{fontSize:32,marginBottom:12}}>👤</div>
                    <div style={{fontSize:14,opacity:.6,marginBottom:8}}>No contacts loaded yet</div>
                    <p style={{fontSize:12,opacity:.4,marginBottom:16}}>Contacts are pulled from Zoho Mail.<br/>Add a /contacts endpoint to your Railway backend to load them.</p>
                    <button className="btn blue" style={{borderRadius:20}} onClick={fetchContacts}>Load Contacts</button>
                  </div>
                ):(
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10}}>
                    {contacts.filter(c=>{
                      if(!contactSearch.trim())return true;
                      const q=contactSearch.toLowerCase();
                      return (c.name||"").toLowerCase().includes(q)||(c.email||"").toLowerCase().includes(q);
                    }).map((c,i)=>(
                      <div key={i} className="section-card" style={{borderRadius:10,padding:14,display:"flex",alignItems:"center",gap:10}}>
                        <Av name={c.name||c.email} email={c.email} size={38}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name||c.email.split("@")[0]}</div>
                          <div style={{fontSize:11,opacity:.5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.email}</div>
                          {c.company&&<div style={{fontSize:10,opacity:.4,marginTop:1}}>{c.company}</div>}
                          {c.source&&<span style={{fontSize:9,background:"#e8f0fe",color:"#1a73e8",padding:"1px 5px",borderRadius:8,fontWeight:600}}>{c.source}</span>}
                        </div>
                        <button className="btn ghost" style={{fontSize:10,padding:"3px 8px",borderRadius:6,flexShrink:0}} onClick={()=>{setComposeTo(c.email);setComposeMode("reply");setComposeSubj("");setComposeBody("");setCompose("reply");setView("lanes");}}>✉</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Settings */}
          {view==="settings"&&(
            <div style={{flex:1,overflowY:"auto",padding:20}}>
              <div style={{maxWidth:460,margin:"0 auto"}}>
                <h1 style={{fontSize:18,fontWeight:700,marginBottom:20}}>Settings</h1>
                <div className="section-card" style={{borderRadius:12,padding:18,marginBottom:16}}>
                  <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Appearance</div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span style={{fontSize:13}}>Dark Mode</span>
                    <button onClick={()=>setDark(!dark)} style={{width:44,height:24,borderRadius:12,background:dark?"#1a73e8":"#ddd",border:"none",cursor:"pointer",position:"relative",transition:"background .2s"}}>
                      <div style={{position:"absolute",top:2,left:dark?22:2,width:20,height:20,borderRadius:"50%",background:"white",transition:"left .2s"}}></div>
                    </button>
                  </div>
                </div>
                <div className="section-card" style={{borderRadius:12,padding:18,marginBottom:16}}>
                  <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>API Endpoints</div>
                  {[["Inbox",BASE+"/inbox"],["Message",BASE+"/message/:folder/:id"],["Triage",BASE+"/triage"],["Reply",BASE+"/reply"],["Forward",BASE+"/forward"],["Delete","DELETE "+BASE+"/message/:folder/:id"]].map(([l,v])=>(
                    <div key={l} style={{marginBottom:10}}>
                      <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",opacity:.5,marginBottom:3}}>{l}</div>
                      <div style={{background:"rgba(128,128,128,.08)",border:"1px solid rgba(128,128,128,.15)",padding:"6px 10px",borderRadius:6,fontSize:11,fontFamily:"monospace",opacity:.8}}>{v}</div>
                    </div>
                  ))}
                </div>
                <div className="section-card" style={{borderRadius:12,padding:18}}>
                  <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>Signature</div>
                  <div style={{background:"rgba(128,128,128,.08)",border:"1px solid rgba(128,128,128,.15)",borderRadius:8,padding:12,fontSize:12,lineHeight:1.8,opacity:.8}}>
                    <strong>Alfonso Mendez</strong><br/>President & CEO | Metwall<br/>M (281) 827 3470 · D (346) 406 1330<br/>www.metwall.com · Houston, TX 77043
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
